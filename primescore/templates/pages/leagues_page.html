<section id="leaguesPage" class="page">
  <div class="container">
    <h2>League Search</h2>
    <div class="form-group">
      <label for="leagueSearch">Search for a league</label>
      <div class="autocomplete-wrapper">
        <input type="text" id="leagueSearch" placeholder="Premier League, Bundesliga, La Liga…" autocomplete="off" />
        <div class="autocomplete-suggestions" id="leagueSuggestions" style="display:none"></div>
      </div>
    </div>
    <p class="error-message" id="leagueError"></p>
    <div id="leagueStandingsDisplay"></div>
  </div>
</section>
