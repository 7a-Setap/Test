name: Run PrimeScore Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # 1. Database Setup
    # Since you use psycopg2, you likely need a Postgres database for your tests.
    # This spins up an empty Postgres container alongside your test runner.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: primescore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Change this if you use 3.10 or 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
        # Install your main application requirements (adjust the path if needed)
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
        # Install the test-specific requirements you uploaded
        pip install -r 7a-setap/test/Test-14a0b913c35051b2a44833e2b70a9fe740acb4fe/requirements-test.txt

    - name: Run pytest
      env:
        # Your conftest.py provides safe defaults for these, but it's good practice 
        # to explicitly define them in the CI environment as well.
        SECRET_KEY: "test-secret-key"
        FOOTBALL_API_KEY: "test-api-key"
        
        # Pass the database connection URL for the Postgres service created above
        DATABASE_URL: "postgresql://test_user:test_password@localhost:5432/primescore_test"
      
      # Run pytest pointing directly to your test directory
      run: |
        pytest 7a-setap/test/Test-14a0b913c35051b2a44833e2b70a9fe740acb4fe/
