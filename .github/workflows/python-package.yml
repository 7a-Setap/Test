name: Run PrimeScore Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
        # Install your app's main dependencies
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
        # Install your test dependencies (update this path if requirements-test.txt is inside a 'tests' folder)
        if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
        if [ -f tests/requirements-test.txt ]; then pip install -r tests/requirements-test.txt; fi

    - name: Run pytest
      env:
        SECRET_KEY: "test-secret-key"
        FOOTBALL_API_KEY: "test-api-key"
      run: |
        # Run pytest on the entire repository
        pytest
